name: Weekly runner

on:
  schedule:
    - cron: "0 5 * * 1" # Every Monday at 5 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode
        required: false
        default: standard
        type: choice
        options:
          - standard
          - overtime
      start_date:
        description: Start date for custom runs (YYYY-MM-DD)
        required: false
        type: string
      end_date:
        description: End date for custom runs (YYYY-MM-DD)
        required: false
        type: string

jobs:
  runner:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --prod

      - name: Run TypeScript script
        run: |
          ARGS=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.mode }}" ]; then
              ARGS+=(--mode "${{ github.event.inputs.mode }}")
            fi
            if [ -n "${{ github.event.inputs.start_date }}" ]; then
              ARGS+=(--start "${{ github.event.inputs.start_date }}")
            fi
            if [ -n "${{ github.event.inputs.end_date }}" ]; then
              ARGS+=(--end "${{ github.event.inputs.end_date }}")
            fi
          fi

          echo "Running: node src/index.ts ${ARGS[*]}"
          node src/index.ts "${ARGS[@]}"
        env:
          TZ: ${{ secrets.TZ }}
          GH_TOKENS: ${{ secrets.GH_TOKENS }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_APP_USER: ${{ secrets.GOOGLE_APP_USER }}
          GOOGLE_EMAIL_APP_PASSWORD: ${{ secrets.GOOGLE_EMAIL_APP_PASSWORD }}

      - name: Update repository secret
        if: hashFiles('refresh_token') != ''
        run: |
          if [ -s refresh_token ]; then
            gh secret set GOOGLE_REFRESH_TOKEN --body "$(cat refresh_token)" --repo ${{ github.repository }}
            echo "Refresh token updated"
          else
            echo "No new refresh token to update"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
